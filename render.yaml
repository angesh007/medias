services:
  - type: web
    name: rss-pipeline
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        sync: false          # set in Render dashboard
      - key: DATABASE_URL
        sync: false          # set in Render dashboard (Supabase postgres connection string)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: rss
      - key: SERPER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: INTERNAL_DOC_URL
        value: "https://yfjhxoaklcjekwncpiih.supabase.co/storage/v1/object/public/rss/Internaldoc.docx.pdf"
      - key: BRIGHTDATA_WSS
        sync: false          # optional
      - key: COUNTRY
        value: in
      - key: MAX_RESULTS_PER_SITE
        value: "50"
